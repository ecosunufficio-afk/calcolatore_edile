<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcolatore Edile — D.ESIGN STUDIOS</title>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Helvetica Neue','Helvetica',Arial,sans-serif;background:#F8F6F4;color:#1A1A1A;min-height:100vh}
  :root{
    --red:#8B1A1A; --red2:#A52020; --red-dark:#6B1212; --red-light:#C4393930;
    --red-faint:#FDF5F5; --black:#1A1A1A; --white:#FFFFFF; --gray:#F8F6F4;
    --gray2:#F0EDE9; --border:#E8E2DC; --muted:#8A7F78; --success:#2E7D4F;
    --danger:#8B1A1A; --sidebar:#1A1A1A; --sidebar-active:#2C2C2C;
    --font-display:'Helvetica Neue','Helvetica',Arial,sans-serif;
    --font-body:'Helvetica Neue','Helvetica',Arial,sans-serif;
  }

  /* ── LAYOUT & SIDEBAR ── */
  #app{display:flex;min-height:100vh}
  #sidebar{width:260px;min-height:100vh;background:var(--sidebar);display:flex;flex-direction:column;position:sticky;top:0;transition:width .25s;box-shadow:3px 0 24px rgba(0,0,0,.2);overflow:hidden}
  #sidebar.collapsed{width:64px}
  .sb-logo{padding:22px 18px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:12px}
  .sb-logo-brand{color:#fff;font-weight:600;font-size:15px;letter-spacing:.5px}
  .sb-btn{background:transparent;border:none;color:rgba(255,255,255,.5);padding:11px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;width:100%;transition:all .15s}
  .sb-btn:hover, .sb-btn.active{background:rgba(139,26,26,.15);color:#fff}
  .sb-save{padding:12px;margin-top:auto;border-top:1px solid rgba(255,255,255,.06)}
  .sb-save button{background:var(--red);border:none;color:#fff;border-radius:8px;padding:11px;width:100%;cursor:pointer;font-weight:600}

  /* ── MAIN CONTENT ── */
  #main{flex:1;display:flex;flex-direction:column;min-width:0}
  #topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;min-height:70px}
  .topbar-total{font-size:24px;font-weight:800;color:var(--success)}
  #content{flex:1;padding:28px;overflow-y:auto}

  /* ── CARD & UI ── */
  .voce-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;transition:transform .2s}
  .voce-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.05)}
  .voce-info{flex:1}
  .voce-nome{font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
  .voce-chips{display:flex;gap:8px;margin-top:4px}
  .chip{background:var(--gray2);padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;color:var(--muted)}
  .voce-prezzo{font-size:20px;font-weight:800;color:var(--success)}
  .btn-group{display:flex;gap:8px}
  .btn-action{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--gray2);transition:all .2s}
  .btn-action:hover{background:var(--border)}
  .btn-del{color:var(--red);border-color:rgba(139,26,26,0.2)}
  .btn-del:hover{background:#FDF5F5}

  /* ── MODALE ── */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000}
  .modal{background:#fff;width:90%;max-width:500px;border-radius:16px;padding:24px;box-shadow:0 20px 40px rgba(0,0,0,0.2)}
  .modal-title{font-size:18px;font-weight:700;margin-bottom:20px;text-transform:uppercase}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .form-field{display:flex;flex-direction:column;gap:6px}
  .form-field label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase}
  .form-field input{padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;outline:none}
  .form-field input:focus{border-color:var(--red)}
  .modal-actions{margin-top:24px;display:flex;justify-content:flex-end;gap:12px}
  .btn-save{background:var(--black);color:#fff;border:none;padding:12px 24px;border-radius:8px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-brand">CALCOLATORE</div>
    </div>
    <nav style="padding:10px 0">
      <button class="sb-btn active" onclick="showView('riepilogo')">📊 Riepilogo Progetto</button>
      <button class="sb-btn" onclick="showView('materiali')">🏗️ Preventivo Materiali</button>
      <button class="sb-btn" onclick="showView('lavorazioni')">🛠️ Stima Lavorazioni</button>
    </nav>
    <div class="sb-save">
      <button onclick="salvaProgetto()">💾 SALVA PROGETTO</button>
    </div>
  </aside>

  <main id="main">
    <header id="topbar">
      <div>
        <h2 id="proj-title">Nuovo Progetto</h2>
      </div>
      <div class="topbar-total" id="global-total">€ 0,00</div>
    </header>

    <div id="content">
      </div>
  </main>
</div>

<div id="modal-edit" class="overlay">
  <div class="modal">
    <h3 class="modal-title">Modifica Voce</h3>
    <div class="form-grid">
      <div class="form-field" style="grid-column: span 2">
        <label>Nome Descrizione</label>
        <input type="text" id="edit-nome">
      </div>
      <div class="form-field">
        <label>Quantità / Superficie</label>
        <input type="number" id="edit-qta" step="0.01">
      </div>
      <div class="form-field">
        <label>Tariffa Unitata (€)</label>
        <input type="number" id="edit-prezzo" step="0.01">
      </div>
      <div class="form-field">
        <label>Margine (%)</label>
        <input type="number" id="edit-margine">
      </div>
      <div class="form-field">
        <label>Unità di Misura</label>
        <input type="text" id="edit-um" readonly>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-action" onclick="closeModal()">Annulla</button>
      <button class="btn-save" onclick="confermaModifica()">Aggiorna Voce</button>
    </div>
  </div>
</div>

<script>
  // STATO DELL'APP
  let progetto = {
    nome: "Nuovo Progetto",
    materiali: [],
    lavorazioni: [] // Ora gestita con la stessa architettura dei materiali
  };

  let editingIndex = null;
  let editingType = null; // 'materiale' o 'lavorazione'

  // FUNZIONE DI RENDERING LAVORAZIONI (ARCHITETTURA IDENTICA AI MATERIALI)
  function renderLavorazioni() {
    const container = document.getElementById('content');
    let html = `<h1 class="page-title">🛠️ Stima Lavorazioni</h1><p class="page-sub">Gestione manodopera e servizi</p>`;
    
    if (progetto.lavorazioni.length === 0) {
      html += `<div style="text-align:center; padding:50px; color:#888">Nessuna lavorazione aggiunta.</div>`;
    } else {
      progetto.lavorazioni.forEach((lav, index) => {
        const totaleLav = lav.qta * lav.prezzo * (1 + lav.margine / 100);
        html += `
          <div class="voce-card">
            <div class="voce-info">
              <div class="voce-nome">${lav.nome}</div>
              <div class="voce-chips">
                <span class="chip">Qta: ${lav.qta} ${lav.um}</span>
                <span class="chip">Tariffa: €${lav.prezzo.toFixed(2)}</span>
                <span class="chip">Margine: ${lav.margine}%</span>
              </div>
            </div>
            <div style="text-align:right">
              <div class="voce-prezzo">€ ${totaleLav.toLocaleString('it-IT', {minimumFractionDigits: 2})}</div>
              <div class="btn-group">
                <button class="btn-action" onclick="openEditModal('lavorazione', ${index})">✏️ Modifica</button>
                <button class="btn-action btn-del" onclick="rimuoviVoce('lavorazione', ${index})">🗑️ Elimina</button>
              </div>
            </div>
          </div>`;
      });
    }
    
    // Pulsante per aggiungere lavorazione personalizzata (stessa logica materiali)
    html += `<button class="btn-save" style="margin-top:20px" onclick="aggiungiLavorazioneVuota()">+ Aggiungi Lavorazione</button>`;
    
    container.innerHTML = html;
    aggiornaTotaleGlobale();
  }

  // GESTIONE MODIFICA (UNIFICATA)
  function openEditModal(type, index) {
    editingType = type;
    editingIndex = index;
    const voce = type === 'materiale' ? progetto.materiali[index] : progetto.lavorazioni[index];

    document.getElementById('edit-nome').value = voce.nome;
    document.getElementById('edit-qta').value = voce.qta;
    document.getElementById('edit-prezzo').value = voce.prezzo;
    document.getElementById('edit-margine').value = voce.margine || 0;
    document.getElementById('edit-um').value = voce.um;

    document.getElementById('modal-edit').style.display = 'flex';
  }

  function confermaModifica() {
    const list = editingType === 'materiale' ? progetto.materiali : progetto.lavorazioni;
    const voce = list[editingIndex];

    voce.nome = document.getElementById('edit-nome').value;
    voce.qta = parseFloat(document.getElementById('edit-qta').value);
    voce.prezzo = parseFloat(document.getElementById('edit-prezzo').value);
    voce.margine = parseFloat(document.getElementById('edit-margine').value);

    closeModal();
    editingType === 'materiale' ? renderMateriali() : renderLavorazioni();
  }

  function aggiungiLavorazioneVuota() {
    progetto.lavorazioni.push({
      nome: "NUOVA LAVORAZIONE",
      qta: 1,
      prezzo: 0,
      margine: 0,
      um: "cad"
    });
    renderLavorazioni();
  }

  function rimuoviVoce(type, index) {
    if(confirm("Eliminare questa voce?")) {
      if(type === 'materiale') progetto.materiali.splice(index, 1);
      else progetto.lavorazioni.splice(index, 1);
      type === 'materiale' ? renderMateriali() : renderLavorazioni();
    }
  }

  function aggiornaTotaleGlobale() {
    const totMat = progetto.materiali.reduce((acc, m) => acc + (m.qta * m.prezzo * (1 + (m.margine||0)/100)), 0);
    const totLav = progetto.lavorazioni.reduce((acc, l) => acc + (l.qta * l.prezzo * (1 + (l.margine||0)/100)), 0);
    const totale = totMat + totLav;
    document.getElementById('global-total').innerText = `€ ${totale.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
  }

  function closeModal() {
    document.getElementById('modal-edit').style.display = 'none';
  }

  function showView(view) {
    document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
    if(view === 'lavorazioni') {
        renderLavorazioni();
        document.querySelector('button[onclick*="lavorazioni"]').classList.add('active');
    }
    // ... logica per altre viste (materiali, riepilogo)
  }

  // Inizializzazione
  window.onload = () => renderLavorazioni();
</script>

</body>
</html>
